# ── Whisper-Small scale encoder + CTC + multilingual multi-dataset ──
experiment_name: "llm_whisper_small_ctc_multi"

# Frontend
frontend_type: "raw"
n_mels: 80
patch_frames: 8
hop_frames: 8

# Audio Encoder — Whisper Small scale
d_model: 768
n_heads: 12
n_layers: 12
d_ff: 3072
max_seq_len: 2000
dropout: 0.1
causal: true

# 50Hz features
use_50hz: true

# CTC auxiliary loss — CTC only, no LM (ctc_warmup_steps > total_steps)
use_ctc: true
ctc_weight: 1.0
ctc_warmup_steps: 999999

# LLM (frozen — encoder/projector only)
llm_model: "Qwen/Qwen3-0.6B"
llm_dim: 1024
max_text_len: 128
unfreeze_llm_layers: 0

# Separate LRs — lowered for stability (12L encoder, multilingual)
encoder_lr: 1.0e-4
projector_lr: 3.0e-4

# Datasets: English heavy (~2500h) + multilingual FLEURS (~130h)
datasets:
  # ── English (heavy) ──
  - name: "openslr/librispeech_asr"
    split: "train.clean.100+train.clean.360+train.other.500"
    text_col: "text"
    max_dur: 20.0
  - name: "sanchit-gandhi/tedlium-data"
    split: "train"
    text_col: "text"
    max_dur: 20.0
  - name: "facebook/voxpopuli"
    config: "en"
    split: "train"
    text_col: "normalized_text"
    max_dur: 20.0
  - name: "MLCommons/peoples_speech"
    config: "clean"
    split: "train[:300000]"
    text_col: "text"
    max_dur: 20.0
  # ── Multilingual (google/fleurs) ──
  - name: "google/fleurs"
    config: "en_us"
    split: "train"
    text_col: "transcription"
    max_dur: 20.0
  - name: "google/fleurs"
    config: "ko_kr"
    split: "train"
    text_col: "transcription"
    max_dur: 20.0
  - name: "google/fleurs"
    config: "ja_jp"
    split: "train"
    text_col: "transcription"
    max_dur: 20.0
  - name: "google/fleurs"
    config: "cmn_hans_cn"
    split: "train"
    text_col: "transcription"
    max_dur: 20.0
  - name: "google/fleurs"
    config: "hi_in"
    split: "train"
    text_col: "transcription"
    max_dur: 20.0
  - name: "google/fleurs"
    config: "ta_in"
    split: "train"
    text_col: "transcription"
    max_dur: 20.0
  - name: "google/fleurs"
    config: "bn_in"
    split: "train"
    text_col: "transcription"
    max_dur: 20.0
  - name: "google/fleurs"
    config: "id_id"
    split: "train"
    text_col: "transcription"
    max_dur: 20.0
  - name: "google/fleurs"
    config: "vi_vn"
    split: "train"
    text_col: "transcription"
    max_dur: 20.0
  - name: "google/fleurs"
    config: "th_th"
    split: "train"
    text_col: "transcription"
    max_dur: 20.0
  - name: "google/fleurs"
    config: "fil_ph"
    split: "train"
    text_col: "transcription"
    max_dur: 20.0

max_audio_duration: 20.0
sr: 16000

# Fallback (not used when datasets is set)
data_dir: "data/mels"
train_split: "train.100"
test_splits: ["test.clean", "test.other"]

# Training
batch_size: 4
grad_accum: 8
lr: 1.0e-4
warmup_steps: 2000
total_steps: 150000
weight_decay: 0.01
max_grad_norm: 0.5
mixed_precision: "bf16"

# Checkpointing
save_every: 10000
eval_every: 10000
log_every: 50
output_dir: "outputs"
wandb_project: "audio-token-toys-llm"
