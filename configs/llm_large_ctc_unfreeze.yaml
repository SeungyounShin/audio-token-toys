# ── LLM decoder + CTC + partial LLM unfreezing ──
experiment_name: "llm_raw_large_ctc_unfreeze"

# Frontend
frontend_type: "raw"
n_mels: 80
patch_frames: 8
hop_frames: 8

# Audio Encoder (Whisper Large encoder scale)
d_model: 1280
n_heads: 20
n_layers: 32
d_ff: 5120
max_seq_len: 500
dropout: 0.1
causal: true

# CTC auxiliary loss at 50Hz conv features
use_ctc: true
ctc_weight: 0.3

# LLM (first 4 layers unfrozen for audio adaptation)
llm_model: "Qwen/Qwen3-0.6B"
llm_dim: 1024
max_text_len: 128
unfreeze_llm_layers: 4

# Data (full LibriSpeech 960hrs)
data_dir: "data/mels"
train_split: "train.100+train.360+train.500"
test_splits: ["test.clean", "test.other"]
sr: 16000

# Training
batch_size: 4
grad_accum: 8
lr: 1.0e-4
warmup_steps: 2000
total_steps: 50000
weight_decay: 0.01
max_grad_norm: 1.0
mixed_precision: "bf16"

# Checkpointing
save_every: 5000
eval_every: 10000
log_every: 50
output_dir: "outputs"
wandb_project: "audio-token-toys-llm"
