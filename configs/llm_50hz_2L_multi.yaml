# ── Phase 2: 2L transformer + multi-dataset ──
experiment_name: "llm_50hz_2L_multi"

# Frontend
frontend_type: "raw"
n_mels: 80
patch_frames: 8
hop_frames: 8

# Audio Encoder — 2-layer causal transformer on 50Hz conv features
d_model: 512
n_heads: 8
n_layers: 2
d_ff: 2048
max_seq_len: 2000
dropout: 0.1
causal: true

# 50Hz features
use_50hz: true

# CTC on transformer output
use_ctc: true
ctc_weight: 0.3
ctc_warmup_steps: 3000

# LLM (full fine-tune)
llm_model: "Qwen/Qwen3-0.6B"
llm_dim: 1024
max_text_len: 128
unfreeze_llm_layers: 99

# Separate LRs
encoder_lr: 3.0e-4
projector_lr: 1.0e-3

# Multi-dataset (~2500h: LibriSpeech 960h + TED-LIUM ~450h + VoxPopuli-en ~540h + People's Speech 300K subset)
datasets:
  - name: "openslr/librispeech_asr"
    split: "train.clean.100+train.clean.360+train.other.500"
    text_col: "text"
    max_dur: 20.0
  - name: "sanchit-gandhi/tedlium-data"
    split: "train"
    text_col: "text"
    max_dur: 20.0
  - name: "facebook/voxpopuli"
    config: "en"
    split: "train"
    text_col: "normalized_text"
    max_dur: 20.0
  - name: "MLCommons/peoples_speech"
    config: "clean"
    split: "train[:300000]"
    text_col: "text"
    max_dur: 20.0
max_audio_duration: 20.0
sr: 16000

# Data (fallback, not used when datasets is set)
data_dir: "data/mels"
train_split: "train.100"
test_splits: ["test.clean", "test.other"]

# Training — more data, more steps
batch_size: 4
grad_accum: 8
lr: 1.0e-4
warmup_steps: 2000
total_steps: 100000
weight_decay: 0.01
max_grad_norm: 1.0
mixed_precision: "bf16"

# Checkpointing
save_every: 10000
eval_every: 10000
log_every: 50
output_dir: "outputs"
wandb_project: "audio-token-toys-llm"
